name: Notify Children Templates
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - ts-template
          - rust-template
          - solidity-template
          - dapp-template
          - cairo-vite-template
          - noir-vite-template
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sripwoud
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: sripwoud/${{ matrix.repo }}
          event-type: template-sync
