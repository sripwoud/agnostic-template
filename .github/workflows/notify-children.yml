name: Notify Children Templates
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - ts-template
          - rust-template
          - solidity-template
          - dapp-template
          - cairo-vite-template
          - noir-vite-template
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: sripwoud/${{ matrix.repo }}
          event-type: template-sync
